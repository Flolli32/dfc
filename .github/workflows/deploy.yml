name: Deploy zu IONOS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lokale Datei heisst "htaccess" (ohne Punkt, damit im Editor sichtbar).
      # Auf dem Server muss sie ".htaccess" heissen.
      - name: htaccess umbenennen
        run: cp htaccess .htaccess

      # GitHub-Runner haben keine IPv6-Route. IONOS-Host loest auf IPv6 auf
      # -> IPv4 ermitteln und in /etc/hosts pinnen. Hostname bleibt damit
      # erhalten (FTPS-Zertifikat passt), Verbindung laeuft aber ueber IPv4.
      - name: FTP-Host auf IPv4 pinnen
        run: |
          IPV4=$(getent ahostsv4 "${{ secrets.FTP_HOST }}" | awk '{print $1; exit}')
          if [ -z "$IPV4" ]; then echo "Keine IPv4 fuer ${{ secrets.FTP_HOST }} gefunden"; exit 1; fi
          echo "$IPV4 ${{ secrets.FTP_HOST }}" | sudo tee -a /etc/hosts
          echo "Gepinnt: $IPV4 -> ${{ secrets.FTP_HOST }}"

      - name: FTPS-Deploy zu IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          # Server-Wurzel. Bei IONOS oft "/" - falls Unterordner, hier anpassen.
          server-dir: ./
          # Dateien, die NICHT hochgeladen werden sollen
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md
            **/*.bak
            **/.DS_Store
            **/Thumbs.db
            **/desktop.ini
            htaccess
            .gitignore
            .gitignore.bak
            ressources/players/_originale/**
            ressources/galerie/private/**
