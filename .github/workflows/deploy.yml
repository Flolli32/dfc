name: Deploy zu IONOS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deploy-Ordner bauen: nur das, was auf den Server soll.
      # Doku, Git-Metadaten, Backups und Editor-Kram bleiben draussen.
      # "htaccess" wird zu ".htaccess" (auf dem Server mit Punkt noetig).
      - name: Deploy-Ordner vorbereiten
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='deploy' \
            --exclude='*.md' \
            --exclude='*.bak' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='desktop.ini' \
            --exclude='ressources/players/_originale' \
            --exclude='ressources/galerie/private' \
            ./ ./deploy/
          cp htaccess ./deploy/.htaccess
          rm -f ./deploy/htaccess
          echo "--- Inhalt deploy/ ---"
          ls -la ./deploy/

      - name: SFTP-Deploy zu IONOS
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 22
          local_path: './deploy/*'
          # Server-Wurzel. Bei IONOS-Webhosting meist "/" oder der
          # Pfad den FileZilla beim Verbinden anzeigt. Ggf. anpassen.
          remote_path: '/'
          sftp_only: true
